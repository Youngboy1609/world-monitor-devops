apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-rest
  labels:
    app.kubernetes.io/name: redis-rest
    app.kubernetes.io/part-of: worldmonitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-rest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-rest
        app.kubernetes.io/part-of: worldmonitor
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis-rest
          image: ghcr.io/GHCR_OWNER/worldmonitor-redis-rest:main-latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "80"
            - name: SRH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: SRH_TOKEN
            - name: SRH_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: SRH_CONNECTION_STRING
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
