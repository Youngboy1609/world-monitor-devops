apiVersion: apps/v1
kind: Deployment
metadata:
  name: worldmonitor
  labels:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/part-of: worldmonitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: worldmonitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worldmonitor
        app.kubernetes.io/part-of: worldmonitor
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worldmonitor
          image: ghcr.io/GHCR_OWNER/worldmonitor-app:main-latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: worldmonitor-config
          env:
            - name: UPSTASH_REDIS_REST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: REDIS_TOKEN
            - name: LLM_API_URL
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: LLM_API_URL
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: LLM_API_KEY
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: LLM_MODEL
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: GROQ_API_KEY
            - name: AISSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: AISSTREAM_API_KEY
            - name: FINNHUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: FINNHUB_API_KEY
            - name: EIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: EIA_API_KEY
            - name: FRED_API_KEY
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: FRED_API_KEY
            - name: ACLED_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: ACLED_ACCESS_TOKEN
            - name: NASA_FIRMS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: NASA_FIRMS_API_KEY
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: CLOUDFLARE_API_TOKEN
            - name: AVIATIONSTACK_API
              valueFrom:
                secretKeyRef:
                  name: worldmonitor-secrets
                  key: AVIATIONSTACK_API
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
