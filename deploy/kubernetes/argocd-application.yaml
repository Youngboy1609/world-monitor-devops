apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: worldmonitor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Youngboy1609/world-monitor-devops.git
    targetRevision: main
    path: deploy/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: worldmonitor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
