apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: worldmonitor
  labels:
    app.kubernetes.io/name: worldmonitor
    app.kubernetes.io/part-of: worldmonitor
spec:
  ingressClassName: traefik
  rules:
    - host: worldmonitor.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: worldmonitor
                port:
                  name: http
