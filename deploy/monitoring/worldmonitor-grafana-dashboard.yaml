apiVersion: v1
kind: ConfigMap
metadata:
  name: worldmonitor-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  worldmonitor-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"worldmonitor\",container!=\"POD\",container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "title": "WorldMonitor CPU by pod",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"worldmonitor\",container!=\"POD\",container!=\"\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "title": "WorldMonitor memory by pod",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "targets": [
            {
              "expr": "kube_pod_container_status_restarts_total{namespace=\"worldmonitor\"}",
              "legendFormat": "{{pod}} / {{container}}"
            }
          ],
          "title": "Container restarts",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "targets": [
            {
              "expr": "sum(kube_pod_status_ready{namespace=\"worldmonitor\",condition=\"true\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "title": "Ready pods",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": [
        "worldmonitor",
        "kubernetes"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "title": "WorldMonitor Kubernetes Operations",
      "uid": "worldmonitor-k8s-ops",
      "version": 1
    }
